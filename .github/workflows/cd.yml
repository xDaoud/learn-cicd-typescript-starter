name: cd
on:
  push:
    branches: [main]

jobs:
    deploy:
        name: deploy
        runs-on: ubuntu-latest

        steps:
        - name: Check out code
          uses: actions/checkout@v4

        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: 22

        - name: Install dependencies
          run: npm ci

        - name: Build
          run: npm run build
